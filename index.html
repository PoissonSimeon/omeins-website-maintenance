<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omeins!! | En Maintenance</title>
    
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { omeins: '#bd00ff', dark: '#050505', darker: '#000000' }, 
                    fontFamily: { sans: ['Outfit', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    
    <style>
        :root { --violet: #bd00ff; }
        body { 
            background-color: #000; 
            color: #fff; 
            overflow: hidden; /* Empêche le scroll, page fixe */
            -webkit-font-smoothing: antialiased; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        #fireflies-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 0; 
            pointer-events: none; 
        }

        .glow-text {
            text-shadow: 0 0 40px rgba(189, 0, 255, 0.4);
        }
    </style>
</head>
<body class="antialiased selection:bg-omeins selection:text-white flex flex-col items-center justify-center min-h-screen">

    <!-- Animation des particules en fond -->
    <canvas id="fireflies-canvas"></canvas>

    <!-- Contenu Central -->
    <main class="relative z-10 flex flex-col items-center justify-center text-center px-6">
        
        <div class="transform transition-transform duration-1000 hover:scale-105">
            <h1 class="text-6xl sm:text-7xl md:text-8xl lg:text-9xl font-black tracking-tighter leading-none mb-6 glow-text">
                OMEINS<span class="text-omeins">!!</span>
            </h1>
        </div>

        <div class="flex flex-col items-center gap-4 mt-8">
            <div class="h-px w-24 bg-gradient-to-r from-transparent via-omeins to-transparent"></div>
            
            <h2 class="text-xl md:text-3xl text-white/80 font-light tracking-[0.3em] uppercase animate-pulse">
                Site en maintenance
            </h2>
            
            <p class="text-sm md:text-base text-white/40 tracking-widest mt-2 font-mono">
                De retour très vite...
            </p>
            
            <div class="h-px w-24 bg-gradient-to-r from-transparent via-omeins to-transparent"></div>
        </div>

    </main>

    <script>
        // --- ANIMATION CANVAS (LUCIOLES/ETOILES) ---
        const canvas = document.getElementById('fireflies-canvas'); 
        const ctx = canvas ? canvas.getContext('2d') : null; 
        let particles = [];
        
        function resizeCanvas() { 
            if(canvas) { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
            } 
        }
        
        if(canvas) {
            window.addEventListener('resize', resizeCanvas); 
            resizeCanvas();
            
            class Particle {
                constructor() { 
                    this.x = Math.random() * canvas.width; 
                    this.y = Math.random() * canvas.height; 
                    this.s = Math.random() * 1.5 + 0.5; 
                    this.sx = (Math.random() - 0.5) * 0.1; 
                    this.sy = (Math.random() - 0.5) * 0.1; 
                    this.o = Math.random(); 
                    this.fd = Math.random() > 0.5 ? 1 : -1; 
                }
                update() { 
                    this.x += this.sx; 
                    this.y += this.sy; 
                    this.o += 0.002 * this.fd; 
                    if (this.o >= 0.8) this.fd = -1; 
                    if (this.o <= 0.1) this.fd = 1; 
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) { 
                        this.x = Math.random() * canvas.width; 
                        this.y = Math.random() * canvas.height; 
                    } 
                }
                draw() { 
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.o})`; 
                    ctx.beginPath(); 
                    ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2); 
                    ctx.fill(); 
                }
            }
            
            function animateParticles() { 
                ctx.clearRect(0, 0, canvas.width, canvas.height); 
                if(particles.length === 0) {
                    for(let i=0; i<(canvas.width*canvas.height)/18000; i++) particles.push(new Particle()); 
                }
                particles.forEach(p => { p.update(); p.draw(); }); 
                requestAnimationFrame(animateParticles); 
            }
            
            animateParticles();
        }
    </script>
</body>
</html>
